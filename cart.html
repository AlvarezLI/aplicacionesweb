<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUVEA — Carrito</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>guardAuth();</script>
</head>
<body>

  <nav class="navbar">
    <a href="index.html" class="nav-brand">
      <svg class="nav-logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="3" fill="#1A1917"/><path d="M7 8v12M7 8l14 12M21 8v12" stroke="#FAFAF8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="nav-brand-name">uvea</span>
    </a>

    <ul class="nav-links">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="pages/moda.html">Moda</a></li>
      <li><a href="pages/electronica.html">Electrónica</a></li>
      <li><a href="pages/hogar.html">Hogar</a></li>
    </ul>

    <a href="cart.html" class="nav-cart" aria-label="Carrito">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="cart-badge"></span>
    </a>
    <button class="nav-toggle" aria-label="Menú" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <button class="btn-logout" onclick="authLogout()">Cerrar sesión</button>
  </nav>

  <main>
    <section class="cart-section">
      <div class="container">
        <p class="section-label">Mi carrito</p>

        <div id="cartEmpty" class="cart-empty" style="display:none">
          <p>Tu carrito está vacío.</p>
          <a href="index.html" class="hero-cta">Ir a la tienda</a>
        </div>

        <div id="cartTable" class="cart-table-wrap" style="display:none">
          <table class="cart-table">
            <thead>
              <tr>
                <th>Producto</th>
                <th>Precio</th>
                <th>Cantidad</th>
                <th>Subtotal</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="cartItems"></tbody>
          </table>
          <div class="cart-footer">
            <div class="cart-total-row">
              <span>Total</span>
              <span id="cartTotal">$0</span>
            </div>
            <button class="btn-submit cart-checkout">Finalizar compra</button>
          </div>
        </div>

      </div>
    </section>
  </main>

  <footer>
    <span class="footer-brand">Nuvea</span>
    <span>&copy; 2026 NUVEA. Todos los derechos reservados.</span>
  </footer>

  <script>
    function renderCart() {
      const items   = cartGet();
      const emptyEl = document.getElementById('cartEmpty');
      const tableEl = document.getElementById('cartTable');
      const bodyEl  = document.getElementById('cartItems');
      const totalEl = document.getElementById('cartTotal');

      if (items.length === 0) {
        emptyEl.style.display = 'block';
        tableEl.style.display = 'none';
        return;
      }

      emptyEl.style.display = 'none';
      tableEl.style.display = 'block';

      bodyEl.innerHTML = items.map(item => `
        <tr class="cart-row">
          <td class="cart-name">${item.name}</td>
          <td class="cart-cell">$${item.price.toLocaleString('es-AR')}</td>
          <td class="cart-cell">
            <div class="qty-control">
              <button onclick="changeQty('${item.id}', -1)">&#8722;</button>
              <span>${item.qty}</span>
              <button onclick="changeQty('${item.id}', 1)">+</button>
            </div>
          </td>
          <td class="cart-cell">$${(item.price * item.qty).toLocaleString('es-AR')}</td>
          <td class="cart-cell cart-remove">
            <button onclick="removeItem('${item.id}')" aria-label="Eliminar">&#215;</button>
          </td>
        </tr>
      `).join('');

      totalEl.textContent = '$' + cartTotal().toLocaleString('es-AR');
    }

    function changeQty(id, delta) {
      const items = cartGet();
      const item  = items.find(i => i.id === id);
      if (!item) return;
      item.qty = Math.max(1, item.qty + delta);
      cartSave(items);
      updateCartBadge();
      renderCart();
    }

    function removeItem(id) {
      cartRemove(id);
      renderCart();
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>

</body>
</html>
