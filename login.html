<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NUVEA — Iniciar sesión</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="js/auth.js"></script>
  <script>
    /* Si ya hay sesión activa, redirigir al home */
    if (isLoggedIn()) window.location.replace('index.html');
  </script>
</head>
<body>

  <nav class="navbar">
    <a href="gate.html" class="nav-brand">
      <svg class="nav-logo" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="28" height="28" rx="3" fill="#1A1917"/><path d="M7 8v12M7 8l14 12M21 8v12" stroke="#FAFAF8" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        
      </svg>
      <span class="nav-brand-name">uvea</span>
    </a>
    <ul class="nav-links">
      <li><a href="gate.html">Inicio</a></li>
      <li><a href="pages/moda.html">Moda</a></li>
      <li><a href="pages/electronica.html">Electrónica</a></li>
      <li><a href="pages/hogar.html">Hogar</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Menú" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
    <a href="register.html" class="btn-logout">Crear cuenta</a>
  </nav>

  <main>
    <div class="auth-wrap">

      <!-- Form panel -->
      <div class="auth-panel">
        <div class="auth-form-wrap">

          <p class="auth-eyebrow">Bienvenido</p>
          <h1 class="auth-title">Iniciar sesión</h1>
          <p class="auth-subtitle">Accedé a tu cuenta para continuar.</p>

          <form id="loginForm" novalidate>

            <div class="form-field">
              <label class="form-label" for="email">Correo electrónico</label>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="tu@correo.com"
                required
                autocomplete="email"
              />
            </div>

            <div class="form-field">
              <label class="form-label" for="password">Contraseña</label>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
            </div>

            <button type="submit" class="btn-submit">Ingresar</button>

            <p class="form-error" id="loginError"></p>

          </form>

          <div class="form-divider"></div>

          <p class="auth-footer">
            ¿No tenés cuenta?
            <a href="register.html">Registrate aquí</a>
          </p>

        </div>
      </div>

      <!-- Visual panel -->
      <div class="auth-visual" aria-hidden="true">
        <p class="auth-visual-text">
          Nuvea<br/>
          Premium<br/>
          Lifestyle
        </p>
      </div>

    </div>
  </main>

  <script>
    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorEl  = document.getElementById('loginError');

      const result = authLogin(email, password);

      if (result.ok) {
        window.location.href = 'index.html';
      } else {
        errorEl.textContent = result.error;
        errorEl.classList.add('visible');
      }
    });

    /* Ocultar error al escribir */
    ['email', 'password'].forEach(id => {
      document.getElementById(id).addEventListener('input', () => {
        document.getElementById('loginError').classList.remove('visible');
      });
    });
  </script>

</body>
</html>
